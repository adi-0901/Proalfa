<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Policy Library — Proalfa Dynamic</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f5f5f3; --card: #ffffff; --card2: #eeede9;
  --text: #1a1a18; --text2: #6b6b67; --border: rgba(0,0,0,0.09); --border2: rgba(0,0,0,0.16);
  --blue: #185FA5; --blue-bg: #E6F1FB; --blue-text: #042C53;
  --green: #0F6E56; --green-bg: #E1F5EE; --green-text: #04342C;
  --amber: #854F0B; --amber-bg: #FAEEDA; --amber-text: #412402;
  --red: #A32D2D; --red-bg: #FCEBEB; --red-text: #501313;
  --purple: #5B35A8; --purple-bg: #F0EAFB; --purple-text: #2D0F5C;
  --r: 8px; --r2: 12px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1a1a18; --card: #232320; --card2: #2c2c28;
    --text: #f0ede8; --text2: #9a9a96; --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.14);
    --blue: #378ADD; --blue-bg: #0c2540; --blue-text: #B5D4F4;
    --green: #1D9E75; --green-bg: #062820; --green-text: #9FE1CB;
    --amber: #EF9F27; --amber-bg: #2a1a04; --amber-text: #FAC775;
    --red: #E24B4A; --red-bg: #2c0f0f; --red-text: #F7C1C1;
    --purple: #9B6EE8; --purple-bg: #1a0f2e; --purple-text: #C9A8F8;
  }
}
body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; }

/* ── Login ── */
#loginOverlay { position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:1000; }
.lcard { background:var(--card);border:1px solid var(--border2);border-radius:var(--r2);padding:40px;width:340px; }
.lcard h2 { font-size:18px;font-weight:700;margin-bottom:4px; }
.lcard p { color:var(--text2);font-size:12px;margin-bottom:24px; }
.lcard label { display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text2);margin-bottom:6px; }
.lcard input { width:100%;padding:9px 12px;border:1px solid var(--border2);border-radius:var(--r);background:var(--card2);color:var(--text);font-size:14px;outline:none;margin-bottom:16px;font-family:inherit; }
.lcard input:focus { border-color:var(--blue); }
.lerr { color:var(--red);font-size:12px;margin-top:-10px;margin-bottom:12px;display:none; }

/* ── Header ── */
.hdr { background:var(--card);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100; }
.hdr-title { font-size:15px;font-weight:700; }
.hdr-sub { font-size:11px;color:var(--text2); }
.btn { padding:7px 14px;border-radius:var(--r);border:1px solid var(--border2);background:var(--card);color:var(--text);font-size:12px;font-weight:500;cursor:pointer; }
.btn:hover { border-color:var(--blue);color:var(--blue); }
.btn-primary { background:var(--blue);border-color:var(--blue);color:#fff; }
.btn-primary:hover { opacity:.88;color:#fff; }

/* ── Layout ── */
.app { max-width:900px;margin:0 auto;padding:28px 20px; }

/* ── Search & filter bar ── */
.topbar { display:flex;gap:10px;margin-bottom:24px;flex-wrap:wrap;align-items:center; }
.search-wrap { flex:1;min-width:220px;position:relative; }
.search-wrap input { width:100%;padding:9px 12px 9px 36px;border:1px solid var(--border2);border-radius:var(--r);background:var(--card);color:var(--text);font-size:13px;outline:none;font-family:inherit; }
.search-wrap input:focus { border-color:var(--blue); }
.search-icon { position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text2);font-size:14px; }
.filters { display:flex;gap:6px;flex-wrap:wrap; }
.filter-btn { padding:6px 12px;border-radius:20px;border:1px solid var(--border2);background:var(--card);color:var(--text2);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s; }
.filter-btn:hover,.filter-btn.active { border-color:var(--blue);color:var(--blue);background:var(--blue-bg); }

/* ── Category header ── */
.cat-header { display:flex;align-items:center;gap:10px;margin:28px 0 12px;padding-bottom:8px;border-bottom:1px solid var(--border); }
.cat-icon { font-size:18px; }
.cat-title { font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text2); }
.cat-count { font-size:11px;color:var(--text2);margin-left:auto; }

/* ── Policy card (accordion) ── */
.policy-card { background:var(--card);border:1px solid var(--border);border-radius:var(--r2);margin-bottom:8px;overflow:hidden;transition:box-shadow .15s; }
.policy-card:hover { box-shadow:0 2px 12px rgba(0,0,0,.07); }
.policy-header { display:flex;align-items:center;gap:12px;padding:14px 18px;cursor:pointer;user-select:none; }
.policy-tag { padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap; }
.tag-blue   { background:var(--blue-bg);color:var(--blue); }
.tag-green  { background:var(--green-bg);color:var(--green); }
.tag-amber  { background:var(--amber-bg);color:var(--amber); }
.tag-red    { background:var(--red-bg);color:var(--red); }
.tag-purple { background:var(--purple-bg);color:var(--purple); }
.policy-title { font-size:14px;font-weight:600;flex:1; }
.policy-subtitle { font-size:12px;color:var(--text2);margin-top:1px; }
.policy-chevron { color:var(--text2);font-size:16px;transition:transform .2s;flex-shrink:0; }
.policy-card.open .policy-chevron { transform:rotate(180deg); }
.policy-body { display:none;padding:0 18px 18px;border-top:1px solid var(--border); }
.policy-card.open .policy-body { display:block; }

/* ── Policy content styles ── */
.policy-body p { font-size:13px;color:var(--text2);line-height:1.7;margin-top:14px; }
.policy-body h4 { font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text2);margin-top:18px;margin-bottom:8px; }
.policy-body ul { padding-left:18px;margin-top:6px; }
.policy-body ul li { font-size:13px;line-height:1.7;color:var(--text);margin-bottom:3px; }
.policy-body ul li strong { font-weight:600; }
.steps { display:flex;flex-direction:column;gap:0;margin-top:14px; }
.step { display:flex;gap:14px;padding:12px 0;border-bottom:1px solid var(--border); }
.step:last-child { border-bottom:none; }
.step-num { width:28px;height:28px;border-radius:50%;background:var(--blue-bg);color:var(--blue);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px; }
.step-content { flex:1; }
.step-title { font-size:13px;font-weight:600; }
.step-desc { font-size:12px;color:var(--text2);line-height:1.65;margin-top:3px; }
.roles-grid { display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:10px;margin-top:14px; }
.role-card { background:var(--card2);border:1px solid var(--border);border-radius:var(--r);padding:14px; }
.role-title { font-size:13px;font-weight:700;margin-bottom:6px; }
.role-dept { font-size:11px;color:var(--text2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em; }
.role-card ul { padding-left:14px; }
.role-card ul li { font-size:12px;color:var(--text);line-height:1.6; }
.kpi-table { width:100%;border-collapse:collapse;margin-top:14px;font-size:12px; }
.kpi-table th { text-align:left;padding:8px 10px;background:var(--card2);color:var(--text2);font-weight:700;text-transform:uppercase;font-size:10px;letter-spacing:.06em;border-bottom:1px solid var(--border); }
.kpi-table td { padding:9px 10px;border-bottom:1px solid var(--border);vertical-align:top;line-height:1.5; }
.kpi-table tr:last-child td { border-bottom:none; }
.highlight-box { background:var(--amber-bg);border:1px solid var(--amber);border-radius:var(--r);padding:12px 14px;margin-top:14px;font-size:13px;color:var(--amber-text);line-height:1.6; }
.highlight-box strong { font-weight:700; }
.rule-list { display:flex;flex-direction:column;gap:8px;margin-top:14px; }
.rule-item { display:flex;gap:10px;align-items:flex-start;padding:10px 12px;background:var(--card2);border-radius:var(--r);font-size:13px;line-height:1.6; }
.rule-dot { width:6px;height:6px;border-radius:50%;background:var(--blue);margin-top:7px;flex-shrink:0; }
.fine-table { display:grid;grid-template-columns:auto 1fr;gap:0;margin-top:14px;border:1px solid var(--border);border-radius:var(--r);overflow:hidden; }
.fine-label { padding:10px 14px;font-size:12px;font-weight:600;background:var(--card2);border-bottom:1px solid var(--border); }
.fine-val { padding:10px 14px;font-size:12px;border-bottom:1px solid var(--border);color:var(--text2); }
.fine-label:last-of-type, .fine-val:last-of-type { border-bottom:none; }

/* ── Empty state ── */
.empty { text-align:center;padding:60px 20px;color:var(--text2);font-size:13px; }

/* ── Footer ── */
.footer { text-align:center;padding:20px;font-size:11px;color:var(--text2);margin-top:8px; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginOverlay">
  <div class="lcard">
    <h2>Policy Library</h2>
    <p>Proalfa Dynamic — Staff access</p>
    <label>Password</label>
    <input type="password" id="lpass" placeholder="Enter staff password" onkeydown="if(event.key==='Enter')doLogin()">
    <div class="lerr" id="lerr">Incorrect password.</div>
    <button class="btn btn-primary" style="width:100%" onclick="doLogin()">Enter</button>
  </div>
</div>

<!-- HEADER -->
<div class="hdr">
  <div>
    <div class="hdr-title">Policy Library</div>
    <div class="hdr-sub">Proalfa Dynamic Pvt Ltd — Roles, SOPs & Company Policies</div>
  </div>
  <button class="btn" onclick="doLogout()">Logout</button>
</div>

<!-- APP -->
<div class="app" id="mainApp" style="display:none">
  <div class="topbar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchBox" placeholder="Search policies, roles, rules…" oninput="filterAll()">
    </div>
    <div class="filters">
      <button class="filter-btn active" data-cat="all" onclick="setFilter('all',this)">All</button>
      <button class="filter-btn" data-cat="roles" onclick="setFilter('roles',this)">Roles</button>
      <button class="filter-btn" data-cat="production" onclick="setFilter('production',this)">Production</button>
      <button class="filter-btn" data-cat="finance" onclick="setFilter('finance',this)">Finance</button>
      <button class="filter-btn" data-cat="hr" onclick="setFilter('hr',this)">HR</button>
      <button class="filter-btn" data-cat="quality" onclick="setFilter('quality',this)">Quality</button>
      <button class="filter-btn" data-cat="ops" onclick="setFilter('ops',this)">Operations</button>
      <button class="filter-btn" data-cat="safety" onclick="setFilter('safety',this)">Safety</button>
    </div>
  </div>

  <div id="policyList"></div>
  <div class="empty" id="emptyState" style="display:none">No policies match your search.</div>
</div>

<div class="footer">Proalfa Dynamic Pvt Ltd · Policy Library · Effective 01/04/2025 · Approved by Aditya Jaybhay, MD</div>

<script>
const PASS = 'Proalfa@50';

function doLogin() {
  if (document.getElementById('lpass').value === PASS) {
    sessionStorage.setItem('pol_auth','1');
    document.getElementById('loginOverlay').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
    render();
  } else {
    document.getElementById('lerr').style.display = 'block';
    document.getElementById('lpass').value = '';
    document.getElementById('lpass').focus();
  }
}
function doLogout() {
  sessionStorage.removeItem('pol_auth');
  document.getElementById('loginOverlay').style.display = 'flex';
  document.getElementById('mainApp').style.display = 'none';
}
if (sessionStorage.getItem('pol_auth')) {
  document.getElementById('loginOverlay').style.display = 'none';
  document.getElementById('mainApp').style.display = 'block';
}

// ── POLICY DATA ──────────────────────────────────────────────────
const POLICIES = [

  // ─── ROLES & RESPONSIBILITIES ────────────────────────────────
  {
    id: 'org-structure', cat: 'roles', tag: 'tag-blue', tagLabel: 'Roles',
    title: 'Organizational Structure & Reporting',
    subtitle: 'Who reports to whom — org chart overview',
    body: `
      <p>Proalfa Dynamic's reporting hierarchy ensures clear accountability at every level. All departments ultimately report to the Founder & CEO / Managing Director.</p>
      <div class="roles-grid">
        <div class="role-card">
          <div class="role-dept">Leadership</div>
          <div class="role-title">Aditya Jaybhay — Founder & MD</div>
          <ul><li>Business development & strategy</li><li>Final approval on all major decisions</li><li>Oversee automation & ERP implementation</li><li>Monitor production output & business goals</li></ul>
        </div>
        <div class="role-card">
          <div class="role-dept">Production</div>
          <div class="role-title">Production Head</div>
          <ul><li>Oversee entire factory operations</li><li>Allocate manpower & optimize resources</li><li>Ensure 150 MT/month production target</li><li>Report daily production status to management</li></ul>
        </div>
        <div class="role-card">
          <div class="role-dept">Production</div>
          <div class="role-title">Programmer — Plasma Cutting & CNC</div>
          <ul><li>Prepare & optimize cutting programs</li><li>Reduce material wastage through nesting</li><li>Maintain material utilization above 95%</li><li>Ensure cutting schedules avoid delays</li></ul>
        </div>
        <div class="role-card">
          <div class="role-dept">Quality</div>
          <div class="role-title">QC Engineer / Incharge</div>
          <ul><li>Inspect fabrication at every stage</li><li>SA level & DFT coat thickness verification</li><li>Approve or reject components for dispatch</li><li>Maintain rejection logs & corrective action logs</li></ul>
        </div>
        <div class="role-card">
          <div class="role-dept">Finance & Accounts</div>
          <div class="role-title">Finance Manager</div>
          <ul><li>Allocate funds to specific projects</li><li>Track project-wise expenses & vendor payments</li><li>Follow up on client payments & invoicing</li><li>Implement financial automation tools</li></ul>
        </div>
        <div class="role-card">
          <div class="role-dept">Finance & Accounts</div>
          <div class="role-title">Accountant</div>
          <ul><li>Maintain financial records, taxation & compliance</li><li>Process invoices, payroll & day-to-day accounting</li><li>Ensure all transactions are recorded & tracked</li><li>Approve expenses up to ₹50,000 with Production Head</li></ul>
        </div>
        <div class="role-card">
          <div class="role-dept">Logistics</div>
          <div class="role-title">Dispatch & Logistics Coordinator</div>
          <ul><li>Plan & schedule dispatches per project deadlines</li><li>Coordinate with transport vendors</li><li>Ensure components are packed & documented</li><li>Track shipments & update team on delivery status</li></ul>
        </div>
        <div class="role-card">
          <div class="role-dept">Site</div>
          <div class="role-title">Erection & Site Coordinator</div>
          <ul><li>Manage on-site assembly & structural alignment</li><li>Coordinate with client's team for installation</li><li>Ensure safety & quality during erection</li><li>Log daily progress & flag risks</li></ul>
        </div>
        <div class="role-card">
          <div class="role-dept">Sales</div>
          <div class="role-title">Sales & Marketing Manager</div>
          <ul><li>Handle inquiries, negotiations & closing deals</li><li>Secure advance payments & timely client payments</li><li>Maintain client relationships for repeat business</li><li>Oversee branding & company promotion</li></ul>
        </div>
      </div>`
  },

  {
    id: 'kpis', cat: 'roles', tag: 'tag-blue', tagLabel: 'Roles',
    title: 'Performance Review KPIs',
    subtitle: 'How each role is measured and evaluated',
    body: `
      <p>All team members are evaluated against defined KPIs reviewed quarterly by management.</p>
      <table class="kpi-table">
        <thead><tr><th>Role</th><th>Key Performance Indicators</th></tr></thead>
        <tbody>
          <tr><td><strong>Production Head</strong></td><td>Output vs Target, Downtime analysis, Rejection percentage</td></tr>
          <tr><td><strong>Project Execution Head</strong></td><td>Site completion timelines, contractor performance, material utilization</td></tr>
          <tr><td><strong>Senior Accountant</strong></td><td>Invoice cycle time, compliance error rate, reporting accuracy</td></tr>
          <tr><td><strong>Production Supervisor</strong></td><td>Output per worker, cleanliness score, work allocation accuracy</td></tr>
          <tr><td><strong>Store Keeper</strong></td><td>Stock accuracy, audit pass rate, issue turnaround time</td></tr>
          <tr><td><strong>QC Incharge</strong></td><td>Rejection rate (target: below 5%), inspection efficiency, SOP compliance</td></tr>
          <tr><td><strong>Site Engineer</strong></td><td>Daily progress accuracy, site safety score, contractor coordination</td></tr>
          <tr><td><strong>Sales & Marketing</strong></td><td>Leads generated, order conversion rate, sales growth, marketing ROI, timely closure</td></tr>
          <tr><td><strong>Programmer</strong></td><td>Material utilization above 95%, error rates, schedule adherence</td></tr>
        </tbody>
      </table>`
  },

  // ─── PRODUCTION ──────────────────────────────────────────────
  {
    id: 'production-milestones', cat: 'production', tag: 'tag-green', tagLabel: 'Production',
    title: 'Production Process — All 20 Milestones',
    subtitle: 'Sales, production & dispatch stages end-to-end',
    body: `
      <h4>Phase 1 — Sales & Purchase (Steps 1–7)</h4>
      <div class="steps">
        <div class="step"><div class="step-num">1</div><div class="step-content"><div class="step-title">Project Finalization</div><div class="step-desc">Receive project, finalize terms, generate Purchase Order (PO) with advance payment terms.</div></div></div>
        <div class="step"><div class="step-num">2</div><div class="step-content"><div class="step-title">Fabrication Drawing Proposal</div><div class="step-desc">Programmer submits proposal to third-party architect for fabrication drawings.</div></div></div>
        <div class="step"><div class="step-num">3</div><div class="step-content"><div class="step-title">Raw Material Estimation</div><div class="step-desc">Programmer calculates estimated raw material (weight, thickness) required.</div></div></div>
        <div class="step"><div class="step-num">4</div><div class="step-content"><div class="step-title">Consumables Estimation</div><div class="step-desc">Purchase team estimates consumables and wear-tear requirements.</div></div></div>
        <div class="step"><div class="step-num">5</div><div class="step-content"><div class="step-title">Client Quotation & Advance</div><div class="step-desc">Submit final quotation with T&C, request minimum 50% advance payment.</div></div></div>
        <div class="step"><div class="step-num">6</div><div class="step-content"><div class="step-title">Payment Distribution</div><div class="step-desc">After receiving advance, distribute funds to raw materials, consumables, contractors, and operational costs.</div></div></div>
        <div class="step"><div class="step-num">7</div><div class="step-content"><div class="step-title">Internal Planning Discussions</div><div class="step-desc">Discuss cutting losses, burning losses, scrap management, and dispatch planning internally.</div></div></div>
      </div>
      <h4>Phase 2 — Production (Steps 8–13)</h4>
      <div class="steps">
        <div class="step"><div class="step-num">8</div><div class="step-content"><div class="step-title">Raw Material Procurement</div><div class="step-desc">Place orders for raw material plates, ensure receipt with valid test certificates.</div></div></div>
        <div class="step"><div class="step-num">9</div><div class="step-content"><div class="step-title">Cutting Program</div><div class="step-desc">Programmer plans and submits cutting program to operators for material cutting.</div></div></div>
        <div class="step"><div class="step-num">10</div><div class="step-content"><div class="step-title">Material Cutting</div><div class="step-desc">Start cutting plates per program, label parts with clear part marks, provide shop drawings to operators.</div></div></div>
        <div class="step"><div class="step-num">11</div><div class="step-content"><div class="step-title">H-Beam Formation</div><div class="step-desc">Transfer cut materials to H-beam operator. All small parts must be cut before H-beam fabrication starts.</div></div></div>
        <div class="step"><div class="step-num">12</div><div class="step-content"><div class="step-title">Welding & Base Plate Work</div><div class="step-desc">Contractors handle manual welding and base plate attachment. QC engineers verify at each stage.</div></div></div>
        <div class="step"><div class="step-num">13</div><div class="step-content"><div class="step-title">Quality Checks (QC)</div><div class="step-desc">QC verifies raw material certificates, welding quality, small part accuracy, and preparation before blasting.</div></div></div>
      </div>
      <h4>Phase 3 — Dispatch (Steps 14–20)</h4>
      <div class="steps">
        <div class="step"><div class="step-num">14</div><div class="step-content"><div class="step-title">Copper Blasting</div><div class="step-desc">Achieve SA 2.5 blasting standard. QC verifies surface finish before painting.</div></div></div>
        <div class="step"><div class="step-num">15</div><div class="step-content"><div class="step-title">Painting</div><div class="step-desc">Order paint per client's color code, apply coats per requirements, verify DFT with QC checks after each coat.</div></div></div>
        <div class="step"><div class="step-num">16</div><div class="step-content"><div class="step-title">Dispatch Preparation</div><div class="step-desc">Arrange transport and dispatch materials per installation grid. Provide invoices based on weight and agreed rates.</div></div></div>
        <div class="step"><div class="step-num">17</div><div class="step-content"><div class="step-title">Milestone-Based Payments</div><div class="step-desc">Request 40% payment after first dispatch, 10% after all material is dispatched.</div></div></div>
        <div class="step"><div class="step-num">18</div><div class="step-content"><div class="step-title">Payment Distribution</div><div class="step-desc">Use milestone payments to clear pending dues for suppliers and operational costs.</div></div></div>
        <div class="step"><div class="step-num">19</div><div class="step-content"><div class="step-title">Scrap Management</div><div class="step-desc">Discuss cutting losses, scrap handling, dispatch, and payments internally.</div></div></div>
        <div class="step"><div class="step-num">20</div><div class="step-content"><div class="step-title">Machine Maintenance</div><div class="step-desc">Ensure weekly maintenance of machines and cleanliness of premises for smooth operations.</div></div></div>
      </div>`
  },

  {
    id: 'ops-process', cat: 'production', tag: 'tag-green', tagLabel: 'Production',
    title: 'Step-by-Step Operations Process (A–I)',
    subtitle: 'Design, procurement, fabrication, QC, dispatch & erection',
    body: `

// ── RENDER ───────────────────────────────────────────────────────
let activeFilter = 'all';

function setFilter(cat, el) {
  activeFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  filterAll();
}

function filterAll() {
  const q = (document.getElementById('searchBox').value || '').toLowerCase();
  render(q, activeFilter);
}

function render(q = '', cat = 'all') {
  const list = document.getElementById('policyList');
  const empty = document.getElementById('emptyState');

  const filtered = POLICIES.filter(p => {
    const matchCat = cat === 'all' || p.cat === cat;
    const matchQ   = !q || p.title.toLowerCase().includes(q) || p.subtitle.toLowerCase().includes(q) || p.body.toLowerCase().includes(q);
    return matchCat && matchQ;
  });

  if (!filtered.length) { list.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';

  const cats = [
    { key:'roles',      icon:'👤', label:'Roles & Responsibilities' },
    { key:'production', icon:'🏭', label:'Production & Milestones' },
    { key:'quality',    icon:'✅', label:'Quality Control' },
    { key:'finance',    icon:'💰', label:'Finance & Accounts' },
    { key:'hr',         icon:'📋', label:'HR & Discipline' },
    { key:'ops',        icon:'⚙️', label:'Operations & Store' },
    { key:'safety',     icon:'🦺', label:'Safety & PPE' },
  ];

  let html = '';
  cats.forEach(c => {
    const items = filtered.filter(p => p.cat === c.key);
    if (!items.length) return;
    html += `<div class="cat-header"><span class="cat-icon">${c.icon}</span><span class="cat-title">${c.label}</span><span class="cat-count">${items.length} polic${items.length===1?'y':'ies'}</span></div>`;
    items.forEach(p => {
      html += `<div class="policy-card" id="card-${p.id}">
        <div class="policy-header" onclick="toggle('${p.id}')">
          <span class="policy-tag ${p.tag}">${p.tagLabel}</span>
          <div><div class="policy-title">${p.title}</div><div class="policy-subtitle">${p.subtitle}</div></div>
          <span class="policy-chevron">▾</span>
        </div>
        <div class="policy-body">${p.body}</div>
      </div>`;
    });
  });
  list.innerHTML = html;
}

function toggle(id) {
  document.getElementById('card-' + id).classList.toggle('open');
}

if (sessionStorage.getItem('pol_auth')) render();
