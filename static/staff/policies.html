<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Policy Library — Proalfa Dynamic</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f5f5f3; --card: #ffffff; --card2: #eeede9;
  --text: #1a1a18; --text2: #6b6b67; --border: rgba(0,0,0,0.09); --border2: rgba(0,0,0,0.16);
  --blue: #185FA5; --blue-bg: #E6F1FB; --blue-text: #042C53;
  --green: #0F6E56; --green-bg: #E1F5EE; --green-text: #04342C;
  --amber: #854F0B; --amber-bg: #FAEEDA; --amber-text: #412402;
  --red: #A32D2D; --red-bg: #FCEBEB; --red-text: #501313;
  --purple: #5B35A8; --purple-bg: #F0EAFB; --purple-text: #2D0F5C;
  --r: 8px; --r2: 12px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1a1a18; --card: #232320; --card2: #2c2c28;
    --text: #f0ede8; --text2: #9a9a96; --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.14);
    --blue: #378ADD; --blue-bg: #0c2540; --blue-text: #B5D4F4;
    --green: #1D9E75; --green-bg: #062820; --green-text: #9FE1CB;
    --amber: #EF9F27; --amber-bg: #2a1a04; --amber-text: #FAC775;
    --red: #E24B4A; --red-bg: #2c0f0f; --red-text: #F7C1C1;
    --purple: #9B6EE8; --purple-bg: #1a0f2e; --purple-text: #C9A8F8;
  }
}
body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; }

/* ── Login ── */
#loginOverlay { position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:1000; }
.lcard { background:var(--card);border:1px solid var(--border2);border-radius:var(--r2);padding:40px;width:340px; }
.lcard h2 { font-size:18px;font-weight:700;margin-bottom:4px; }
.lcard p { color:var(--text2);font-size:12px;margin-bottom:24px; }
.lcard label { display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text2);margin-bottom:6px; }
.lcard input { width:100%;padding:9px 12px;border:1px solid var(--border2);border-radius:var(--r);background:var(--card2);color:var(--text);font-size:14px;outline:none;margin-bottom:16px;font-family:inherit; }
.lcard input:focus { border-color:var(--blue); }
.lerr { color:var(--red);font-size:12px;margin-top:-10px;margin-bottom:12px;display:none; }

/* ── Header ── */
.hdr { background:var(--card);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100; }
.hdr-title { font-size:15px;font-weight:700; }
.hdr-sub { font-size:11px;color:var(--text2); }
.btn { padding:7px 14px;border-radius:var(--r);border:1px solid var(--border2);background:var(--card);color:var(--text);font-size:12px;font-weight:500;cursor:pointer; }
.btn:hover { border-color:var(--blue);color:var(--blue); }
.btn-primary { background:var(--blue);border-color:var(--blue);color:#fff; }
.btn-primary:hover { opacity:.88;color:#fff; }

/* ── Layout ── */
.app { max-width:900px;margin:0 auto;padding:28px 20px; }

/* ── Search & filter bar ── */
.topbar { display:flex;gap:10px;margin-bottom:24px;flex-wrap:wrap;align-items:center; }
.search-wrap { flex:1;min-width:220px;position:relative; }
.search-wrap input { width:100%;padding:9px 12px 9px 36px;border:1px solid var(--border2);border-radius:var(--r);background:var(--card);color:var(--text);font-size:13px;outline:none;font-family:inherit; }
.search-wrap input:focus { border-color:var(--blue); }
.search-icon { position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text2);font-size:14px; }
.filters { display:flex;gap:6px;flex-wrap:wrap; }
.filter-btn { padding:6px 12px;border-radius:20px;border:1px solid var(--border2);background:var(--card);color:var(--text2);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s; }
.filter-btn:hover,.filter-btn.active { border-color:var(--blue);color:var(--blue);background:var(--blue-bg); }

/* ── Category header ── */
.cat-header { display:flex;align-items:center;gap:10px;margin:28px 0 12px;padding-bottom:8px;border-bottom:1px solid var(--border); }
.cat-icon { font-size:18px; }
.cat-title { font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text2); }
.cat-count { font-size:11px;color:var(--text2);margin-left:auto; }

/* ── Policy card (accordion) ── */
.policy-card { background:var(--card);border:1px solid var(--border);border-radius:var(--r2);margin-bottom:8px;overflow:hidden;transition:box-shadow .15s; }
.policy-card:hover { box-shadow:0 2px 12px rgba(0,0,0,.07); }
.policy-header { display:flex;align-items:center;gap:12px;padding:14px 18px;cursor:pointer;user-select:none; }
.policy-tag { padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap; }
.tag-blue   { background:var(--blue-bg);color:var(--blue); }
.tag-green  { background:var(--green-bg);color:var(--green); }
.tag-amber  { background:var(--amber-bg);color:var(--amber); }
.tag-red    { background:var(--red-bg);color:var(--red); }
.tag-purple { background:var(--purple-bg);color:var(--purple); }
.policy-title { font-size:14px;font-weight:600;flex:1; }
.policy-subtitle { font-size:12px;color:var(--text2);margin-top:1px; }
.policy-chevron { color:var(--text2);font-size:16px;transition:transform .2s;flex-shrink:0; }
.policy-card.open .policy-chevron { transform:rotate(180deg); }
.policy-body { display:none;padding:0 18px 18px;border-top:1px solid var(--border); }
.policy-card.open .policy-body { display:block; }

/* ── Policy content styles ── */
.policy-body p { font-size:13px;color:var(--text2);line-height:1.7;margin-top:14px; }
.policy-body h4 { font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text2);margin-top:18px;margin-bottom:8px; }
.policy-body ul { padding-left:18px;margin-top:6px; }
.policy-body ul li { font-size:13px;line-height:1.7;color:var(--text);margin-bottom:3px; }
.policy-body ul li strong { font-weight:600; }
.steps { display:flex;flex-direction:column;gap:0;margin-top:14px; }
.step { display:flex;gap:14px;padding:12px 0;border-bottom:1px solid var(--border); }
.step:last-child { border-bottom:none; }
.step-num { width:28px;height:28px;border-radius:50%;background:var(--blue-bg);color:var(--blue);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px; }
.step-content { flex:1; }
.step-title { font-size:13px;font-weight:600; }
.step-desc { font-size:12px;color:var(--text2);line-height:1.65;margin-top:3px; }
.roles-grid { display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:10px;margin-top:14px; }
.role-card { background:var(--card2);border:1px solid var(--border);border-radius:var(--r);padding:14px; }
.role-title { font-size:13px;font-weight:700;margin-bottom:6px; }
.role-dept { font-size:11px;color:var(--text2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em; }
.role-card ul { padding-left:14px; }
.role-card ul li { font-size:12px;color:var(--text);line-height:1.6; }
.kpi-table { width:100%;border-collapse:collapse;margin-top:14px;font-size:12px; }
.kpi-table th { text-align:left;padding:8px 10px;background:var(--card2);color:var(--text2);font-weight:700;text-transform:uppercase;font-size:10px;letter-spacing:.06em;border-bottom:1px solid var(--border); }
.kpi-table td { padding:9px 10px;border-bottom:1px solid var(--border);vertical-align:top;line-height:1.5; }
.kpi-table tr:last-child td { border-bottom:none; }
.highlight-box { background:var(--amber-bg);border:1px solid var(--amber);border-radius:var(--r);padding:12px 14px;margin-top:14px;font-size:13px;color:var(--amber-text);line-height:1.6; }
.highlight-box strong { font-weight:700; }
.rule-list { display:flex;flex-direction:column;gap:8px;margin-top:14px; }
.rule-item { display:flex;gap:10px;align-items:flex-start;padding:10px 12px;background:var(--card2);border-radius:var(--r);font-size:13px;line-height:1.6; }
.rule-dot { width:6px;height:6px;border-radius:50%;background:var(--blue);margin-top:7px;flex-shrink:0; }
.fine-table { display:grid;grid-template-columns:auto 1fr;gap:0;margin-top:14px;border:1px solid var(--border);border-radius:var(--r);overflow:hidden; }
.fine-label { padding:10px 14px;font-size:12px;font-weight:600;background:var(--card2);border-bottom:1px solid var(--border); }
.fine-val { padding:10px 14px;font-size:12px;border-bottom:1px solid var(--border);color:var(--text2); }
.fine-label:last-of-type, .fine-val:last-of-type { border-bottom:none; }

/* ── Empty state ── */
.empty { text-align:center;padding:60px 20px;color:var(--text2);font-size:13px; }

/* ── Footer ── */
.footer { text-align:center;padding:20px;font-size:11px;color:var(--text2);margin-top:8px; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginOverlay">
  <div class="lcard">
    <h2>Policy Library</h2>
    <p>Proalfa Dynamic — Staff access</p>
    <label>Password</label>
    <input type="text" id="lpass" placeholder="Enter staff password" autocomplete="off" onkeydown="if(event.key==='Enter')doLogin()">
    <div class="lerr" id="lerr">Incorrect password.</div>
    <button class="btn btn-primary" style="width:100%" onclick="doLogin()">Enter</button>
  </div>
</div>

<!-- HEADER -->
<div class="hdr">
  <div>
    <div class="hdr-title">Policy Library</div>
    <div class="hdr-sub">Proalfa Dynamic Pvt Ltd — Roles, SOPs & Company Policies</div>
  </div>
  <button class="btn" onclick="doLogout()">Logout</button>
</div>

<!-- APP -->
<div class="app" id="mainApp" style="display:none">
  <div class="topbar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchBox" placeholder="Search policies, roles, rules…" oninput="filterAll()">
    </div>
    <div class="filters">
      <button class="filter-btn active" data-cat="all" onclick="setFilter('all',this)">All</button>
      <button class="filter-btn" data-cat="roles" onclick="setFilter('roles',this)">Roles</button>
      <button class="filter-btn" data-cat="production" onclick="setFilter('production',this)">Production</button>
      <button class="filter-btn" data-cat="finance" onclick="setFilter('finance',this)">Finance</button>
      <button class="filter-btn" data-cat="hr" onclick="setFilter('hr',this)">HR</button>
      <button class="filter-btn" data-cat="quality" onclick="setFilter('quality',this)">Quality</button>
      <button class="filter-btn" data-cat="ops" onclick="setFilter('ops',this)">Operations</button>
      <button class="filter-btn" data-cat="safety" onclick="setFilter('safety',this)">Safety</button>
    </div>
  </div>

  <div id="policyList"></div>
  <div class="empty" id="emptyState" style="display:none">No policies match your search.</div>
</div>

<div class="footer">Proalfa Dynamic Pvt Ltd · Policy Library · Effective 01/06/2026 · Approved by Aditya Jaybhay, Founder & Chairman</div>

<script>
const PASS = 'Proalfa@50';

function doLogin() {
  if (document.getElementById('lpass').value === PASS) {
    sessionStorage.setItem('pol_auth','1');
    document.getElementById('loginOverlay').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
    render();
  } else {
    document.getElementById('lerr').style.display = 'block';
    document.getElementById('lpass').value = '';
    document.getElementById('lpass').focus();
  }
}
function doLogout() {
  sessionStorage.removeItem('pol_auth');
  document.getElementById('loginOverlay').style.display = 'flex';
  document.getElementById('mainApp').style.display = 'none';
}
if (sessionStorage.getItem('pol_auth')) {
  document.getElementById('loginOverlay').style.display = 'none';
  document.getElementById('mainApp').style.display = 'block';
}

  {

  {

    body: `

  {

    body: `

  {
    id: 'role-storekeeper', cat: 'roles', tag: 'tag-blue', tagLabel: 'Roles',

    body: `

        <li>Conduct monthly physical stock count and reconcile against ERP. Report variances above 0.5% to Production Head immediately</li>
        <li>Maintain minimum stock levels for all critical consumables — raise replenishment request when stock hits reorder level</li>
        <li>Weigh and log all scrap generated per project. Segregate heavy drops, light scrap, and dust separately</li>
        <li>Maintain store in 5S condition — score must be &gt;85% on monthly QA audit</li>

      <ul>
        <li><strong>Real-time:</strong> Every GRN and every material issue entered in ERP at the moment it happens</li>

        <li><strong>Monthly:</strong> Physical stock count completed and reconciled</li>
        <li><strong>Monthly:</strong> Store must pass 5S audit at &gt;85% score</li>

          <tr><td>Stock variance</td><td>&lt;0.5% on monthly physical count</td></tr>
          <tr><td>Informal issues</td><td>Zero — every issue has a signed slip</td></tr>
          <tr><td>Critical stockouts</td><td>Zero</td></tr>
          <tr><td>5S audit score</td><td>&gt;85% every month</td></tr>
        </tbody>
      </table>`

  {

  {

        <div class="step"><div class="step-num">5</div><div class="step-content"><div class="step-title">Stiffener & Clip Welding</div><div class="step-desc">Weld stiffeners, end plates, connection clips per drawing. QA Officer checks weld size and fit-up before release to next stage.</div></div></div>
        <div class="step"><div class="step-num">6</div><div class="step-content"><div class="step-title">QC Sign-off & Marking</div><div class="step-desc">QA Officer verifies dimensions, weld visual, distortion, bolt hole accuracy. Mark with: Part Mark, Project Code, QC Pass sticker, Erection Grid reference.</div></div></div>

    body: `

// ── RENDER ───────────────────────────────────────────────────────
let activeFilter = 'all';

function setFilter(cat, el) {
  activeFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  filterAll();
}

function filterAll() {
  const q = (document.getElementById('searchBox').value || '').toLowerCase();
  render(q, activeFilter);
}

function render(q = '', cat = 'all') {
  const list = document.getElementById('policyList');
  const empty = document.getElementById('emptyState');

  const filtered = POLICIES.filter(p => {
    const matchCat = cat === 'all' || p.cat === cat;
    const matchQ   = !q || p.title.toLowerCase().includes(q) || p.subtitle.toLowerCase().includes(q) || p.body.toLowerCase().includes(q);
    return matchCat && matchQ;
  });

  if (!filtered.length) { list.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';

  const cats = [
    { key:'roles',      icon:'👤', label:'Roles & Hiring Roadmap' },
    { key:'production', icon:'🏭', label:'Production & Maintenance' },
    { key:'quality',    icon:'✅', label:'Quality Control' },
    { key:'finance',    icon:'💰', label:'Finance & Accounts' },
    { key:'hr',         icon:'📋', label:'HR & Compliance' },
    { key:'ops',        icon:'⚙️', label:'Operations & Store' },
    { key:'safety',     icon:'🦺', label:'Safety & PPE' },
  ];

  let html = '';
  cats.forEach(c => {
    const items = filtered.filter(p => p.cat === c.key);
    if (!items.length) return;
    html += `<div class="cat-header"><span class="cat-icon">${c.icon}</span><span class="cat-title">${c.label}</span><span class="cat-count">${items.length} polic${items.length===1?'y':'ies'}</span></div>`;
    items.forEach(p => {
      html += `<div class="policy-card" id="card-${p.id}">
        <div class="policy-header" onclick="toggle('${p.id}')">
          <span class="policy-tag ${p.tag}">${p.tagLabel}</span>
          <div><div class="policy-title">${p.title}</div><div class="policy-subtitle">${p.subtitle}</div></div>
          <span class="policy-chevron">▾</span>
        </div>
        <div class="policy-body">${p.body}</div>
      </div>`;
    });
  });
  list.innerHTML = html;
}

function toggle(id) {
  document.getElementById('card-' + id).classList.toggle('open');
}

if (sessionStorage.getItem('pol_auth')) render();
